events {
    worker_connections 1024;
}
pid /tmp/nginx.pid;
http {
    # 深度防御：把 proxy/client_body/fastcgi temp 路径绑到 /tmp(容器内 nginx 用户可写)，
    # 不依赖镜像默认的 /var/cache/nginx/* —— 某些 distroless / hardened 镜像不带这些目录。
    # K8s 部署时 /tmp 通常是 emptyDir，大小由 sizeLimit 控制；buffering 已 off，写盘也极少。
    proxy_temp_path /tmp/nginx-proxy-temp;
    client_body_temp_path /tmp/nginx-client-body-temp;
    fastcgi_temp_path /tmp/nginx-fastcgi-temp;
    uwsgi_temp_path /tmp/nginx-uwsgi-temp;
    scgi_temp_path /tmp/nginx-scgi-temp;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Docker internal DNS (for resolving service names).
    # `valid=10s` caps how long nginx caches a positive lookup; a low value lets
    # us pick up container IP changes (e.g. after `docker compose up` rebuilds
    # frontend/gateway/langgraph) without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # NOTE: standard nginx (non-Plus) only resolves `upstream { server X; }` once
    # at startup. In docker-compose every rebuild gives the upstream container a
    # new IP, which leaves nginx pointing at a dead address and serving 502 until
    # nginx itself is restarted. To avoid that, each `location` below uses
    # `set $var "<service:port>"; proxy_pass http://$var...` — this form forces
    # nginx to consult the resolver at request time, so IP changes are picked up
    # within the resolver TTL above. (Same trick the `/api/sandboxes` block has
    # historically used for provisioner.)

    # Preserve the upstream proxy's X-Forwarded-Proto (e.g. 1Panel's "https")
    # instead of blindly overriding it with nginx's own $scheme (which is
    # "http" because the upstream connects to nginx over plain HTTP).
    # Fall back to $scheme when the upstream didn't set it.
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # ── Main server (path-based routing) ─────────────────────────────────
    server {
        listen 2026 default_server;
        listen [::]:2026 default_server;
        server_name _;

        # Service endpoints — declared at server scope so all locations can
        # reuse them. Because these are nginx variables (not `upstream {}`
        # entries), nginx must consult the resolver above on every request,
        # which is exactly what we want for docker-compose IP volatility.
        set $gateway_upstream  "gateway:8001";
        set $frontend_upstream "frontend:3000";

        # CORS is handled by the Gateway's allowlist (GATEWAY_CORS_ORIGINS) when
        # the frontend is served cross-origin. Through this nginx proxy everything
        # is same-origin, so no CORS headers are added here.

        # LangGraph-compatible API routes (served by the Gateway-embedded runtime).
        # Rewrites /api/langgraph/* to /api/* before proxying to the Gateway.
        location /api/langgraph/ {
            rewrite ^/api/langgraph/(.*) /api/$1 break;
            # Variable form forces per-request DNS lookup. After `rewrite ... break`,
            # nginx reuses $uri (the rewritten path) when proxy_pass has no URI of
            # its own, so we append $uri$is_args$args explicitly.
            proxy_pass http://$gateway_upstream$uri$is_args$args;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Connection '';

            # SSE/Streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;

            # Timeouts for long-running requests
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # Chunked transfer encoding
            chunked_transfer_encoding on;
        }

        # Custom API: Models endpoint
        location /api/models {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Custom API: Memory endpoint
        location /api/memory {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Custom API: MCP configuration endpoint
        location /api/mcp {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Custom API: Skills configuration endpoint
        location /api/skills {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Custom API: Agents endpoint
        location /api/agents {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Custom API: Uploads endpoint
        location ~ ^/api/threads/[^/]+/uploads {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

            # Large file upload support
            client_max_body_size 100M;
            proxy_request_buffering off;
        }

        # Custom API: Other endpoints under /api/threads
        location ~ ^/api/threads {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # API Documentation: Swagger UI
        location /docs {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # API Documentation: ReDoc
        location /redoc {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # API Documentation: OpenAPI Schema
        location /openapi.json {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Health check endpoint (gateway)
        location /health {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # ── Provisioner API (sandbox management) ────────────────────────
        # Use a variable so nginx resolves provisioner at request time (not startup).
        # This allows nginx to start even when provisioner container is not running.
        location /api/sandboxes {
            set $provisioner_upstream provisioner:8002;
            proxy_pass http://$provisioner_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # Catch-all for any /api/* prefix not matched by a more specific block above.
        # Covers the auth module (/api/v1/auth/login, /me, /change-password, ...),
        # plus feedback / runs / token-usage routes that 2.0-rc added without
        # updating this nginx config. Longest-prefix matching ensures the explicit
        # blocks above (/api/models, /api/threads regex, /api/langgraph/,
        # /api/sandboxes, ...) still win for their paths — only truly unmatched
        # /api/* requests land here. Mirrors nginx.local.conf so `make dev` and
        # `make up` behave the same.
        location /api/ {
            proxy_pass http://$gateway_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

            # Auth endpoints set HttpOnly cookies — make sure nginx doesn't
            # strip the Set-Cookie header from upstream responses.
            proxy_pass_header Set-Cookie;
        }

        # All other requests go to frontend
        location / {
            proxy_pass http://$frontend_upstream$request_uri;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # 禁用 proxy 缓冲：dev mode 大 chunk(JS / 字体 / 图片)直接流给客户端，
            # 与 /api/langgraph/ 块保持一致(SSE / 流式上游统一关闭缓冲)。
            # 容器内开 buffering 会带来不必要的写盘 IO + 撑大 emptyDir 配额 + 提高 TTFB。
            proxy_buffering off;
            proxy_cache off;

            # Timeouts
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}
