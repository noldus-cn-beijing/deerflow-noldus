# Sprint 2a 新增:跨范式共享的可调参数。
# 改这里 = 改所有引用此参数的范式;不要在 <paradigm>.yaml 重复定义。
# loader 会自动校验重复 (同名 + 同 default 出现在 2+ paradigm yaml → CatalogError)。
shared_parameters:
  velocity_threshold:
    default: 30.0
    unit: mm/s
    description: "Noldus 默认: ≤ 此速度判为 immobile (静止)。跨范式共用 (EPM/OFT/LDB/ZM/FST 的 velocity-based immobility)。"
    tunable_by_user: true
    valid_range: [1.0, 100.0]

  velocity_min_duration:
    default: 25
    unit: samples
    description: "Noldus 默认: 至少持续此样本数才计入 immobility (25 帧 @ 25fps = 1s)。跨范式共用。"
    tunable_by_user: true
    valid_range: [5, 250]

  sample_size_underpowered_threshold:
    default: 5
    unit: count
    description: "所有范式: 组内样本数 < 此值时,触发 SAMPLE.UNDERPOWERED 警告。"
    tunable_by_user: true
    valid_range: [2, 30]

  pendulum_smooth_window:
    default: 1
    unit: frames
    description: "钟摆检测:预处理平滑窗口,1 = 不平滑。FST/TST 共用。"
    tunable_by_user: true
    valid_range: [1, 25]

  pendulum_analysis_window:
    default: 25
    unit: frames
    description: "钟摆检测:自相关分析窗口,覆盖 3~5 个钟摆周期。FST/TST 共用。"
    tunable_by_user: true
    valid_range: [5, 100]

  pendulum_period_min:
    default: 4
    unit: frames
    description: "钟摆检测:最短搜索周期,对应约 0.16s @ 25fps。"
    tunable_by_user: false
    valid_range: [1, 25]

  pendulum_period_max:
    default: 12
    unit: frames
    description: "钟摆检测:最长搜索周期,对应约 0.48s @ 25fps。"
    tunable_by_user: false
    valid_range: [2, 50]

  pendulum_periodicity_threshold:
    default: 0.55
    unit: ratio
    description: "钟摆检测:周期性强度阈值,钟摆通常 > 0.5。"
    tunable_by_user: true
    valid_range: [0.1, 1.0]

  pendulum_activity_struggle_threshold:
    default: 2.0
    unit: noldus_activity
    description: "钟摆检测:高 Activity 直接判挣扎。"
    tunable_by_user: true
    valid_range: [0.5, 10.0]

  pendulum_min_still_activity:
    default: 0.3
    unit: noldus_activity
    description: "钟摆检测:极低 Activity 直接判静止。"
    tunable_by_user: true
    valid_range: [0.0, 2.0]

  pendulum_moderate_activity_threshold:
    default: 1.0
    unit: noldus_activity
    description: "钟摆检测:中等 Activity 无周期性 → 挣扎。"
    tunable_by_user: true
    valid_range: [0.1, 5.0]

  pendulum_min_state_duration:
    default: 25
    unit: frames
    description: "钟摆检测:状态最短持续帧数 (25fps 下 = 1s)。"
    tunable_by_user: true
    valid_range: [5, 250]

  pendulum_grace_period:
    default: 20
    unit: frames
    description: "钟摆检测:宽容期帧数 (25fps 下)。"
    tunable_by_user: true
    valid_range: [0, 100]

# 通用 charts — 范式无关,作为单被试 / 组间不可对比场景的 fallback 候选。
# C7 要求:加新 chart 时同步在 ethoinsight/scripts/_common/ 下添加 CLI 脚本,
# YAML 注册与脚本必须在同一 PR 落地。

common_charts:
  - id: trajectory_plot
    script: ethoinsight.scripts._common.plot_trajectory
    when: total_subjects >= 1
    display_name_zh: "轨迹图"
    rationale: 单被试或组间数据不全时的轨迹可视化
    requires_columns:
      - x_center
      - y_center

  - id: timeseries_plot
    script: ethoinsight.scripts._common.plot_timeseries
    when: total_subjects >= 1
    display_name_zh: "时间序列图"
    accepts_paradigm: true
    rationale: 单被试或组间数据不全时的时间动态
    requires_columns:
      - trial_time
