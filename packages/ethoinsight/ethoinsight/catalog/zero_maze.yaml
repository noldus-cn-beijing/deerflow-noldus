paradigm: zero_maze
ev19_templates:
  - Zero Maze XT190
  - O-Maze XT190

default_metrics:
  - id: open_zone_time_ratio
    script: ethoinsight.scripts.zero_maze.compute_open_zone_time_ratio
    requires_columns:
      - in_zone_open*
    output_unit: ratio
    display_name_zh: 开放区时间比例
    unit_zh: 比例
    one_liner: 动物在开放区停留时间占总时长的比例
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: open_zone_time
    script: ethoinsight.scripts.zero_maze.compute_open_zone_time
    requires_columns:
      - in_zone_open*
    output_unit: seconds
    display_name_zh: 开放区时间
    unit_zh: 秒
    one_liner: 动物在开放区的累计停留时间
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: open_zone_distance
    script: ethoinsight.scripts.zero_maze.compute_open_zone_distance
    requires_columns:
      - in_zone_open*
      - distance_moved
    output_unit: cm
    display_name_zh: 开放区移动距离
    unit_zh: cm
    one_liner: 动物在开放区的累计移动距离
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: hesitation_count
    script: ethoinsight.scripts.zero_maze.compute_hesitation_count
    requires_columns:
      - in_zone_open*
    output_unit: count
    display_name_zh: 犹豫次数
    unit_zh: 次
    one_liner: 接近边界但未跨入开放区的犹豫行为次数
    direction_for_anxiety: higher_is_anxious
    statistical_default: groupwise_compare

optional_metrics: []

charts:
  - id: box_open_zone
    script: ethoinsight.scripts.zero_maze.plot_box_open_zone
    when: n_per_group >= 3
    display_name_zh: "开放区时间箱线图"
    output_mode: aggregate
    needs_groups: true

  - id: bar_open_zone
    script: ethoinsight.scripts.zero_maze.plot_bar_open_zone
    when: total_subjects >= 1
    display_name_zh: "开放区指标柱状图（均值±SEM）"
    output_mode: aggregate
    needs_groups: true

  - id: trajectory
    script: ethoinsight.scripts._common.plot_trajectory
    when: total_subjects >= 1
    display_name_zh: "轨迹图"

  - id: heatmap
    script: ethoinsight.scripts._common.plot_heatmap
    when: total_subjects >= 1
    display_name_zh: "热区图"

statistics:
  default:
    id: groupwise_compare
    script: ethoinsight.scripts.zero_maze.run_groupwise_stats
    when: n_per_group >= 2 and n_groups >= 2
