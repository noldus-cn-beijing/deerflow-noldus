paradigm: epm
ev19_templates:
  - Elevated Plus Maze XT190

default_metrics:
  - id: open_arm_time_ratio
    script: ethoinsight.scripts.epm.compute_open_arm_time_ratio
    requires_columns:
      - in_zone_open_arms_*
    output_unit: ratio
    display_name_zh: 开放臂时间比例
    unit_zh: 比例
    one_liner: 动物在开放臂中停留时间占总时长的比例，用于评估焦虑样回避行为
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: open_arm_time
    script: ethoinsight.scripts.epm.compute_open_arm_time
    requires_columns:
      - in_zone_open_arms_*
    output_unit: seconds
    display_name_zh: 开放臂时间
    unit_zh: 秒
    one_liner: 动物在开放臂内的累计停留时间
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: open_arm_entry_count
    script: ethoinsight.scripts.epm.compute_open_arm_entry_count
    requires_columns:
      - in_zone_open_arms_*
    output_unit: count
    display_name_zh: 开放臂进入次数
    unit_zh: 次
    one_liner: 进入开放臂的累计次数
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: open_arm_entry_ratio
    script: ethoinsight.scripts.epm.compute_open_arm_entry_ratio
    requires_columns:
      - in_zone_open_arms_*
      - in_zone_closed_arms_*
    output_unit: ratio
    display_name_zh: 开放臂进入比例
    unit_zh: 比例
    one_liner: 进入开放臂次数占总进入次数的比例
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: total_entry_count
    script: ethoinsight.scripts.epm.compute_total_entry_count
    requires_columns:
      - in_zone_open_arms_*
      - in_zone_closed_arms_*
    output_unit: count
    display_name_zh: 总进入次数
    unit_zh: 次
    one_liner: 进入所有臂的累计次数，反映动物的整体探索活动量
    direction_for_anxiety: null
    statistical_default: groupwise_compare

optional_metrics:
  - id: body_elongation_stats
    script: ethoinsight.scripts.epm.compute_body_elongation_stats
    requires_columns: [Elongation]
    output_unit: ratio
    display_name_zh: 身体拉伸度统计
    unit_zh: 比例
    one_liner: 身体拉伸度的均值/标准差/最大/最小值（EV19 GetElongation × 100），SAP 风险评估参考
    direction_for_anxiety: higher_is_anxious
    statistical_default: groupwise_compare

  - id: head_direction_stats
    script: ethoinsight.scripts.epm.compute_head_direction_stats
    requires_columns: [Direction]
    output_unit: radians
    display_name_zh: 头部朝向统计
    unit_zh: 弧度
    one_liner: 头部朝向的 circular mean/stdev（EV19 GetViewDirection），用于开放臂朝向分析
    direction_for_anxiety: null
    statistical_default: groupwise_compare

  - id: turn_angle_stats
    script: ethoinsight.scripts.epm.compute_turn_angle_stats
    requires_columns: [TurnAngle]
    output_unit: radians
    display_name_zh: 转角统计
    unit_zh: 弧度
    one_liner: 绝对转角的均值/标准差（EV19 TurnAngle），thigmotaxis 旋转模式分析
    direction_for_anxiety: null
    statistical_default: groupwise_compare

  - id: body_length
    script: ethoinsight.scripts.epm.compute_body_length
    requires_columns: [x_nose, y_nose, x_center, y_center, x_tail, y_tail]
    output_unit: cm
    display_name_zh: 身体长度（分段求和）
    unit_zh: cm
    one_liner: Nose→Center + Center→Tail 欧氏距离求和，基于 Noldus Body Length - Sum of segments
    direction_for_anxiety: null
    statistical_default: groupwise_compare

charts:
  - id: box_open_arm
    script: ethoinsight.scripts.epm.plot_box_open_arm
    when: n_per_group >= 3
    confidence: must_have
    display_name_zh: "开放臂箱线图"
    output_mode: aggregate
    needs_groups: true
    requires_columns:
      - in_zone_open_arms_*
  - id: open_arm_time_ratio_bar
    script: ethoinsight.scripts.epm.plot_open_arm_time_ratio_bar
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "开放臂时间比例柱状图"
    requires_columns:
      - in_zone_open_arms_*
  - id: zone_entry_distribution
    script: ethoinsight.scripts.epm.plot_zone_entry_distribution
    when: total_subjects >= 1
    confidence: optional
    display_name_zh: "区域进入分布图"
    requires_columns:
      - in_zone_open_arms_*
      - in_zone_closed_arms_*
  - id: trajectory
    script: ethoinsight.scripts._common.plot_trajectory
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "轨迹图"
    requires_columns:
      - x_center
      - y_center
  - id: heatmap
    script: ethoinsight.scripts._common.plot_heatmap
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "热区图"
    requires_columns:
      - x_center
      - y_center

  - id: rose
    script: ethoinsight.scripts.epm.plot_rose
    when: total_subjects >= 1
    confidence: optional
    display_name_zh: "头部朝向玫瑰图"
    requires_columns:
      - Direction

statistics:
  default:
    id: groupwise_compare
    script: ethoinsight.scripts.epm.run_groupwise_stats
    when: n_per_group >= 2 and n_groups >= 2
