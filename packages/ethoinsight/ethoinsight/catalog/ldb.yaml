paradigm: ldb
ev19_templates:
  - Light Dark Box XT190

default_metrics:
  - id: light_time_ratio
    script: ethoinsight.scripts.ldb.compute_light_time_ratio
    requires_columns:
      - in_zone_light*
    output_unit: ratio
    display_name_zh: 亮室时间比例
    unit_zh: 比例
    one_liner: 动物在亮室停留时间占总时长的比例，LDB 焦虑样回避评估的核心指标
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: transition_count
    script: ethoinsight.scripts.ldb.compute_transition_count
    requires_columns:
      - in_zone_light*
    output_unit: count
    display_name_zh: 跨室次数
    unit_zh: 次
    one_liner: 动物在亮室与暗室之间穿梭的累计次数
    direction_for_anxiety: lower_is_anxious
    statistical_default: groupwise_compare

  - id: light_latency
    script: ethoinsight.scripts.ldb.compute_light_latency
    requires_columns:
      - in_zone_light*
    output_unit: seconds
    display_name_zh: 首次进入亮室潜伏期
    unit_zh: 秒
    one_liner: 从测试开始到首次进入亮室的时间
    direction_for_anxiety: higher_is_anxious
    statistical_default: groupwise_compare

optional_metrics: []

charts:
  - id: box_light
    script: ethoinsight.scripts.ldb.plot_box_light
    when: n_per_group >= 3
    confidence: must_have
    display_name_zh: "亮室时间箱线图"
    output_mode: aggregate
    needs_groups: true
    requires_columns:
      - in_zone*

  - id: bar_light
    script: ethoinsight.scripts.ldb.plot_bar_light
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "亮室指标柱状图（均值±SEM）"
    output_mode: aggregate
    needs_groups: true
    requires_columns:
      - in_zone*

  - id: trajectory
    script: ethoinsight.scripts._common.plot_trajectory
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "轨迹图"
    requires_columns:
      - x_center
      - y_center

  - id: heatmap
    script: ethoinsight.scripts._common.plot_heatmap
    when: total_subjects >= 1
    confidence: must_have
    display_name_zh: "热区图"
    requires_columns:
      - x_center
      - y_center

  - id: zone_entry_distribution
    script: ethoinsight.scripts.ldb.plot_zone_entry_distribution
    when: total_subjects >= 1
    display_name_zh: "区域进入分布图"
    requires_columns:
      - in_zone_light
      - in_zone_dark

statistics:
  default:
    id: groupwise_compare
    script: ethoinsight.scripts.ldb.run_groupwise_stats
    when: n_per_group >= 2 and n_groups >= 2
