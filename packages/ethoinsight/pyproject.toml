[project]
name = "ethoinsight"
version = "0.1.0"
description = "EthoVision XT behavioral data analysis library for EthoInsight Agent"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "numpy>=1.24",
    "openpyxl>=3.1",
    "python-calamine>=0.6,<0.7",
    "pyyaml>=6.0",
    "seaborn>=0.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ethoinsight"]

[tool.hatch.build.targets.wheel.shared-data]
# Ensure _facts.json is included when the package is built into a wheel.
# This file is required at runtime by ev19_facts.py (Docker container path-safe).
"ethoinsight/_facts.json" = "ethoinsight/_facts.json"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
