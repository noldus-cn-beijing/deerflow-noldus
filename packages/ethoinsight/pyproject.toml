[project]
name = "ethoinsight"
version = "0.1.0"
description = "EthoVision XT behavioral data analysis library for EthoInsight Agent"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "seaborn>=0.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ethoinsight"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
