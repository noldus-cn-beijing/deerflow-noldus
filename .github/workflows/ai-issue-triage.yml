# and FIX the heredoc indentation before re-enabling.
on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Disabled
        run: echo "AI Issue Triage is disabled (see file header). No-op."
