name: Backend Blocking IO

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "packages/agent/backend/**"
      - ".github/workflows/backend-blocking-io-tests.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/agent/backend/**"
      - ".github/workflows/backend-blocking-io-tests.yml"

concurrency:
  group: blocking-io-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-blocking-io:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend dependencies
        working-directory: packages/agent/backend
        run: uv sync --group dev

      - name: Assert ethoinsight is installed (guards against sync wiping the workspace dep)
        working-directory: packages/agent/backend
        run: uv run python -c "import ethoinsight; from ethoinsight.catalog.loader import load_common_catalog; load_common_catalog(); print('ethoinsight import OK')"

      - name: Run blocking IO regression tests
        working-directory: packages/agent/backend
        run: uv run pytest tests/blocking_io/ -v --no-header

      # ──────────────────────────────────────────────────────────────────────
      # Code-invariant guards (invariants #1/#3/#5/#6). Each step is an
      # independent, named invariant so a failure pinpoints which contract
      # broke. asyncio_mode=auto is set in pyproject.toml [tool.pytest].
      # See docs/handoffs/ for the invariant definitions; sync-deerflow.sh
      # PROTECTED_FILES is the SSOT for invariant #6.
      # ──────────────────────────────────────────────────────────────────────

      - name: Invariant #1 - Gateway/lead-agent import without circular import
        working-directory: packages/agent/backend
        run: uv run pytest tests/test_gateway_import_no_cycle.py -v --no-header

      - name: Invariant #3 - Harness does not import ethoinsight at top level
        working-directory: packages/agent/backend
        run: uv run pytest tests/test_harness_boundary.py -v --no-header

      - name: Invariant #5 - Seal/handoff/subagent regression
        working-directory: packages/agent/backend
        # NOTE: tests/test_subagent_executor.py is intentionally excluded — it reads
        # the real gitignored config.yaml (via get_app_config → tool_search / models),
        # so it can only pass on a developer machine that has config.yaml, not in a
        # clean CI checkout (config.example.yaml's models: section is commented out,
        # so even copying it yields "No models are configured"). A unit test that
        # depends on a gitignored local file is not CI-eligible. TODO: refactor it to
        # mock get_app_config / tool_search so it becomes a real unit test, then re-add.
        run: |
          uv run pytest \
            tests/test_seal_gate_middleware.py \
            tests/test_seal_handoff_tools.py \
            tests/test_seal_resume.py \
            tests/test_seal_data_analyst_parameter_audit.py \
            tests/test_handoff_content_validation.py \
            tests/test_handoff_emission_validator.py \
            tests/test_handoff_isolation_provider.py \
            tests/test_handoff_normalization.py \
            tests/test_handoff_path_pollution_defense.py \
            tests/test_handoff_placeholder_injection_middleware.py \
            tests/test_handoff_schemas.py \
            tests/test_handoff_strict_mode.py \
            tests/test_handoff_write_file_guardrail.py \
            tests/test_chart_maker_config.py \
            tests/test_chart_maker_handoff_schema.py \
            tests/test_data_analyst_config.py \
            tests/test_data_analyst_empty_statistics_seal_rule.py \
            tests/test_data_analyst_insight_contract.py \
            tests/test_data_analyst_step28_contract.py \
            tests/test_data_analyst_thinking_enabled.py \
            tests/test_executor_handoff_emission.py \
            tests/test_task_handoff_authorization.py \
            tests/test_subagent_contracts.py \
            tests/test_subagent_config_capability.py \
            tests/test_subagent_executor_authorized_paths.py \
            tests/test_subagent_executor_recursion_limit.py \
            tests/test_subagent_handoff_isolation_integration.py \
            tests/test_subagent_language_rule.py \
            tests/test_subagent_limit_middleware.py \
            tests/test_subagent_loop_detection.py \
            tests/test_subagent_prompt_clarity.py \
            tests/test_subagent_prompt_security.py \
            tests/test_subagent_prompts_no_catalog_yaml.py \
            tests/test_subagent_skill_path_rewrite.py \
            tests/test_subagent_status_contract.py \
            tests/test_subagent_timeout_config.py \
            tests/test_subagent_token_collector.py \
            tests/test_subagent_user_context_propagation.py \
            -v --no-header

      - name: Invariant #6 - Protected Noldus customizations survive sync
        working-directory: packages/agent/backend
        run: uv run pytest tests/test_protected_files_intact.py -v --no-header
