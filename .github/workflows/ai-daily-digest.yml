name: AI Daily Digest → WeCom

# DISABLED 2026-06-18: the `schedule` trigger is removed — the daily cron was
# failing because NEWAPI_BASE_URL / WECOM_BOT_WEBHOOK secrets were never
# configured (or expired), so it never successfully posted. For a small team
# in v0.1 development writing its own commits, an AI daily digest adds little.
# The job body is preserved below so it can be re-enabled manually once
# secrets are configured: restore the `schedule` block above and run via
# workflow_dispatch to verify first.
on:
  workflow_dispatch:
    inputs:
      days:
        description: '总结过去几天的提交'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits
        id: commits
        run: |
          DAYS="${{ github.event.inputs.days || 1 }}"

          # 获取指定天数内的所有 commit
          SINCE=$(date -d "$DAYS days ago" -u +"%Y-%m-%dT%H:%M:%SZ")

          git log --since="$SINCE" \
            --pretty=format:"%h | %an | %ad | %s" \
            --date=short \
            --all 2>/dev/null | head -100 > /tmp/commits.txt

          echo "commit_count=$(wc -l < /tmp/commits.txt)" >> $GITHUB_OUTPUT
          echo "since=$SINCE" >> $GITHUB_OUTPUT

          cat /tmp/commits.txt

      - name: Summarize with NewAPI
        id: summarize
        if: steps.commits.outputs.commit_count > 0
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          SINCE="${{ steps.commits.outputs.since }}"

          SUMMARY=$(curl -s --max-time 120 "${{ secrets.NEWAPI_BASE_URL }}/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.NEWAPI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg commits "$COMMITS" --arg since "$SINCE" '{
              model: "deepseek-v4-pro",
              temperature: 0.3,
              messages: [{
                role: "system",
                content: "你是 EthoInsight 项目的日报助手。EthoInsight 是面向行为学研究员的 AI 分析助手。\n\n根据 git log，写一份简短的日报（中文），用于发到企业微信群。\n\n要求：\n1. 用一句概括整体进展\n2. 🆕 新功能（feature）\n3. 🐛 修复（fix）\n4. 🔧 重构/工程（chore/refactor）\n5. ⚠️ 需要注意的事项（如果有 merge conflict、revert、紧急修复等）\n6. 如果某类没有，就写\"无\"\n\n控制在 300 字以内。格式适合企业微信 markdown。最后加一行「📊 共 N 个提交」"
              }, {
                "role": "user",
                "content": "从 \($since) 至今的提交记录：\n\n\($commits)"
              }]
            }')"

          DIGEST=$(echo "$SUMMARY" | jq -r '.choices[0].message.content // ""')

          # 保存日报到文件
          echo "$DIGEST" > /tmp/digest.md
          echo "digest<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/digest.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to WeCom
        if: steps.summarize.outputs.digest != ''
        run: |
          DIGEST="${{ steps.summarize.outputs.digest }}"
          DATE=$(date +"%Y-%m-%d")

          # 构造企业微信 markdown 消息
          # doc: https://developer.work.weixin.qq.com/document/path/91770
          curl -s --max-time 10 "${{ secrets.WECOM_BOT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "## 📋 EthoInsight 日报 (${DATE})\n${DIGEST}\n\n> 🤖 AI 自动生成 | $(date '+%Y-%m-%d %H:%M')" '{
              msgtype: "markdown",
              markdown: {
                content: $content
              }
            }')"

      - name: Skip (no commits)
        if: steps.commits.outputs.commit_count == 0
        run: echo "No commits in the period, skipping."
