# Case-001 EPM — 预期分析结论
#
# 这是 agent benchmark 的"标准答案"。
# 填写指引：在每个 TODO 处填写您的判断。完成后删除 TODO。
#
# EPM 指标（来自 ethoinsight catalog）：
#   open_arm_time_ratio  — 开放臂时间比例（核心焦虑指标，值越低越焦虑）
#   open_arm_time        — 开放臂累计时间（秒）
#   open_arm_entry_count — 开放臂进入次数
#   open_arm_entry_ratio — 开放臂进入比例
#   total_entry_count    — 总进入次数（运动能力对照）
# ============================================================

paradigm: "epm"
species: ""                    # TODO: 与 metadata.yaml 一致
n_subjects: 0                  # TODO: 与 metadata.yaml 一致
groups:                        # TODO: 与 metadata.yaml 一致
  # control: ["Subject 1", "Subject 2", "Subject 3"]
  # treatment: ["Subject 4", "Subject 5", "Subject 6"]

# ============================================================
# Layer A: 指标数值期望
# 对每个指标定义您认为合理的数值范围 [min, max]
# 范围可以宽——比如您预期 10-30%，写 [0.08, 0.35] 即可
# 不需要精确值，给合理的上下界
# ============================================================
expected_metrics:
  # --- 核心焦虑指标 ---
  - metric: open_arm_time_ratio
    group: "control"
    expected_range: []         # TODO: 如 [0.10, 0.30]（10%-30%）
    unit: "ratio"
    note: "对照组开放臂时间比例的正常范围"

  - metric: open_arm_time_ratio
    group: "treatment"
    expected_range: []         # TODO: 如 [0.05, 0.15]（5%-15%，焦虑增加）或 [0.25, 0.50]（25%-50%，抗焦虑）
    unit: "ratio"
    note: "处理组开放臂时间比例。方向取决于处理：致焦虑→低于control，抗焦虑→高于control"

  # --- 活动量指标（用于排除运动能力混杂）---
  - metric: total_entry_count
    group: "control"
    expected_range: []         # TODO: 总进入次数正常范围（如 [10, 30]）
    unit: "count"
    note: "总进入次数，反映基础运动能力。如果 treatment 显著低于 control，需考虑运动损伤"

  - metric: total_entry_count
    group: "treatment"
    expected_range: []         # TODO: 处理组总进入次数范围
    unit: "count"

