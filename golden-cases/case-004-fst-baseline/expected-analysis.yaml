# Case-004 FST — 预期分析结论
#
# FST 指标（来自 ethoinsight catalog）：
#   immobility_time       — 不动时间（抑郁核心指标，值越高越抑郁）
#   immobility_latency    — 首次不动潜伏期（值越低越抑郁，更快放弃挣扎）
#   immobility_bout_count — 不动次数（run-length encoding 计数）
#
# 注意：FST 不属于焦虑范式，direction_for_anxiety 为 null。
# 判读方向：不动时间增加 → 抑郁样行为（行为绝望）；不动时间减少 → 抗抑郁效应。
# ============================================================

