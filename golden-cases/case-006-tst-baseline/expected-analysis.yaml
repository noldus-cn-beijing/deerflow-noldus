# Case-006 TST — 预期分析结论
#
# TST 指标（来自 ethoinsight catalog）：
#   immobility_time       — 不动时间（抑郁核心指标，值越高越抑郁）
#   immobility_latency    — 首次不动潜伏期（值越低越抑郁）
#   immobility_bout_count — 不动次数
#
# TST 与 FST 类似，都是抑郁样行为（行为绝望）范式。
# 区别：TST 用悬挂而非游泳，避免了 FST 的体温降低和游泳能力混杂。
# ============================================================

